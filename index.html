<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Page — To-Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F1419;
    --ink-soft:#1A2027;
    --paper:#FBF8F2;
    --paper-dim:#F1ECE1;
    --line:#E3DCC9;
    --sage:#7FA87F;
    --sage-deep:#5C8A5C;
    --coral:#E8674A;
    --gold:#D4A857;
    --text-main:#2B2620;
    --text-soft:#8A8275;
    --shadow-deep: 0 30px 60px -20px rgba(0,0,0,0.55);

    /* category colors */
    --cat-work:#5B7FB5;
    --cat-personal:#B5739A;
    --cat-shopping:#D4A857;
    --cat-health:#6FA378;
    --cat-other:#9A8F7E;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    min-height:100vh;
    height:100%;
  }

  body{
    min-height:100vh;
    background: radial-gradient(circle at 20% -10%, #1c2530 0%, var(--ink) 55%);
    font-family:'Inter', sans-serif;
    color:var(--text-main);
    display:flex;
    justify-content:center;
    align-items:center;
    padding: 40px 20px;
    position:relative;
    overflow-x:hidden;
  }

  /* ambient desk texture */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 1px 1px, rgba(255,255,255,0.035) 1px, transparent 0);
    background-size: 26px 26px;
    pointer-events:none;
  }

  .desk-glow{
    position:fixed;
    top:-10%;
    left:50%;
    width:900px;
    height:900px;
    transform:translateX(-50%);
    background: radial-gradient(circle, rgba(212,168,87,0.10), transparent 65%);
    pointer-events:none;
  }

  .page-wrap{
    position:relative;
    width:100%;
    max-width:620px;
    animation: riseIn 0.7s cubic-bezier(.2,.8,.2,1) both;
  }

  @keyframes riseIn{
    from{ opacity:0; transform: translateY(28px) scale(.985); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  /* the notebook card */
  .sheet{
    background: var(--paper);
    border-radius: 18px;
    box-shadow: var(--shadow-deep), 0 1px 0 rgba(255,255,255,0.4) inset;
    position:relative;
    padding: 46px 44px 38px;
    overflow:hidden;
  }

  /* stitched edge along the top */
  .sheet::before{
    content:"";
    position:absolute;
    top:14px; left:24px; right:24px;
    height:0;
    border-top: 2px dashed rgba(43,38,32,0.13);
  }

  .sheet::after{
    content:"";
    position:absolute;
    left:0; top:0; bottom:0;
    width:46px;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 22px,
      rgba(43,38,32,0.06) 22px,
      rgba(43,38,32,0.06) 23px
    );
    opacity:.5;
  }

  header{
    position:relative;
    z-index:1;
    margin-bottom: 30px;
  }

  .eyebrow{
    font-size:12.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color: var(--text-soft);
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
  }

  .eyebrow .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,168,87,0.18);
  }

  h1{
    font-family:'Fraunces', serif;
    font-weight:600;
    font-size: 38px;
    letter-spacing: -0.01em;
    line-height:1.05;
    margin-top:8px;
    color: var(--ink);
  }

  h1 em{
    font-style:italic;
    font-weight:500;
    color: var(--sage-deep);
  }

  .sub-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-top:14px;
  }

  .date-line{
    font-size:14px;
    color: var(--text-soft);
  }

  .progress-text{
    font-size:13px;
    font-weight:600;
    color: var(--sage-deep);
    font-variant-numeric: tabular-nums;
    transition: opacity .3s;
  }

  /* progress track */
  .progress-track{
    margin-top:14px;
    height:5px;
    width:100%;
    background: var(--line);
    border-radius:3px;
    overflow:hidden;
    position:relative;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background: linear-gradient(90deg, var(--sage) 0%, var(--sage-deep) 100%);
    border-radius:3px;
    transition: width .5s cubic-bezier(.3,.8,.3,1);
  }

  /* input row */
  .add-row{
    position:relative;
    z-index:1;
    display:flex;
    gap:8px;
    margin-bottom: 18px;
  }

  .add-row input{
    flex:1;
    font-family:'Inter', sans-serif;
    font-size:15.5px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: #fff;
    color: var(--text-main);
    outline:none;
    transition: border-color .2s, box-shadow .2s, transform .15s;
  }

  .add-row input::placeholder{ color:#B6AE9D; }

  .add-row input:focus{
    border-color: var(--sage-deep);
    box-shadow: 0 0 0 4px rgba(127,168,127,0.16);
  }

  .add-row input.shake{
    animation: shake .4s;
    border-color: var(--coral);
  }

  .cat-select-wrap{
    position:relative;
    flex-shrink:0;
  }

  .cat-select-wrap::after{
    content:"";
    position:absolute;
    right:11px;
    top:50%;
    width:7px; height:7px;
    border-right:1.5px solid var(--text-soft);
    border-bottom:1.5px solid var(--text-soft);
    transform: translateY(-65%) rotate(45deg);
    pointer-events:none;
  }

  .cat-select{
    -webkit-appearance:none;
    appearance:none;
    font-family:'Inter', sans-serif;
    font-size:14px;
    font-weight:600;
    height:100%;
    padding: 0 30px 0 16px;
    border-radius:12px;
    border:1.5px solid var(--line);
    background:#fff;
    color: var(--text-main);
    cursor:pointer;
    outline:none;
    transition: border-color .2s, box-shadow .2s;
  }

  .cat-select:focus{
    border-color: var(--sage-deep);
    box-shadow: 0 0 0 4px rgba(127,168,127,0.16);
  }

  @keyframes shake{
    0%,100%{ transform: translateX(0); }
    20%{ transform: translateX(-6px); }
    40%{ transform: translateX(5px); }
    60%{ transform: translateX(-4px); }
    80%{ transform: translateX(3px); }
  }

  .add-btn{
    width:50px;
    border:none;
    border-radius:12px;
    background: var(--ink);
    color: var(--paper);
    font-size: 22px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: transform .15s cubic-bezier(.3,1.5,.6,1), background .2s;
    flex-shrink:0;
  }

  .add-btn:hover{ background: var(--sage-deep); }
  .add-btn:active{ transform: scale(.88) rotate(8deg); }

  /* category filter chips */
  .cat-filters{
    position:relative;
    z-index:1;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:22px;
  }

  .cat-chip{
    display:flex;
    align-items:center;
    gap:6px;
    border:1.5px solid var(--line);
    background:#fff;
    border-radius:20px;
    padding: 5px 12px 5px 9px;
    font-size:12.5px;
    font-weight:600;
    color: var(--text-soft);
    cursor:pointer;
    transition: border-color .2s, color .2s, background .2s, transform .12s;
  }

  .cat-chip:hover{ transform: translateY(-1px); }

  .cat-chip .swatch{
    width:8px; height:8px;
    border-radius:50%;
    flex-shrink:0;
  }

  .cat-chip.active{
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
  }

  .cat-chip .count{
    font-variant-numeric: tabular-nums;
    opacity:.6;
    font-weight:500;
  }

  /* list */
  .list{
    position:relative;
    z-index:1;
    list-style:none;
    display:flex;
    flex-direction:column;
    min-height: 64px;
  }

  .task{
    display:flex;
    align-items:flex-start;
    gap:13px;
    padding: 13px 4px;
    border-bottom: 1px solid var(--line);
    position:relative;
    animation: taskIn .38s cubic-bezier(.2,.8,.25,1) both;
  }

  .task:last-child{ border-bottom:none; }

  @keyframes taskIn{
    from{ opacity:0; transform: translateY(-8px) scale(.97); }
    to{ opacity:1; transform: translateY(0) scale(1); }
  }

  .task.removing{
    animation: taskOut .32s cubic-bezier(.4,0,1,1) forwards;
  }

  @keyframes taskOut{
    to{
      opacity:0;
      transform: translateX(26px) scale(.94);
      max-height:0;
      padding-top:0; padding-bottom:0;
      margin:0;
    }
  }

  /* checkbox: the signature "ink stamp" */
  .check{
    width:23px;
    height:23px;
    border-radius:50%;
    border:2px solid #C9C1AE;
    flex-shrink:0;
    margin-top:1px;
    cursor:pointer;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: border-color .2s, transform .15s;
    background:#fff;
  }

  .check:hover{ border-color: var(--sage-deep); transform: scale(1.08); }

  .check svg{
    width:13px; height:13px;
    opacity:0;
    transform: scale(.4);
    transition: opacity .15s, transform .15s;
  }

  .check svg path{
    stroke: #fff;
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
    fill:none;
    stroke-dasharray: 20;
    stroke-dashoffset: 20;
  }

  .task.done .check{
    background: var(--sage-deep);
    border-color: var(--sage-deep);
    animation: stampPop .38s cubic-bezier(.3,1.7,.4,1);
  }

  .task.done .check svg{ opacity:1; transform: scale(1); }
  .task.done .check svg path{
    animation: drawCheck .32s .05s ease forwards;
  }

  @keyframes drawCheck{ to{ stroke-dashoffset:0; } }

  @keyframes stampPop{
    0%{ transform: scale(1); }
    35%{ transform: scale(1.32); box-shadow: 0 0 0 8px rgba(127,168,127,0.18); }
    100%{ transform: scale(1); box-shadow:0 0 0 0 rgba(127,168,127,0); }
  }

  .task-body{
    flex:1;
    min-width:0;
  }

  .task-text{
    font-size:15.5px;
    line-height:1.45;
    color: var(--text-main);
    word-break: break-word;
    position:relative;
    cursor:text;
    outline:none;
    transition: color .25s;
  }

  /* hand-drawn strike-through that draws itself */
  .task-text::after{
    content:"";
    position:absolute;
    left:-1%;
    top:51%;
    width:0%;
    height:1.5px;
    background: var(--text-soft);
    transform: rotate(-0.6deg);
    transition: width .38s cubic-bezier(.3,.7,.3,1);
  }

  .task.done .task-text{ color: var(--text-soft); }
  .task.done .task-text::after{ width:102%; }

  .task-meta{
    font-size:12px;
    color:#B6AE9D;
    margin-top:3px;
    letter-spacing:.01em;
  }

  .task-cat{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11.5px;
    font-weight:600;
    color: var(--text-soft);
    margin-top:5px;
  }

  .task-cat .swatch{
    width:7px; height:7px;
    border-radius:50%;
    flex-shrink:0;
  }

  .task.done .task-cat{ opacity:.5; }

  .task-actions{
    display:flex;
    align-items:center;
    gap:4px;
    opacity:0;
    transform: translateX(4px);
    transition: opacity .15s, transform .15s;
  }

  .task:hover .task-actions{ opacity:1; transform: translateX(0); }

  .icon-btn{
    width:30px; height:30px;
    border:none;
    background:transparent;
    border-radius:8px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--text-soft);
    transition: background .15s, color .15s, transform .15s;
  }

  .icon-btn:hover{ background: var(--paper-dim); color: var(--ink); }
  .icon-btn.delete:hover{ color: var(--coral); background: rgba(232,103,74,0.1); }
  .icon-btn:active{ transform: scale(.85); }

  .icon-btn svg{ width:16px; height:16px; }

  /* empty state */
  .empty-state{
    text-align:center;
    padding: 38px 10px 12px;
    color: var(--text-soft);
    animation: taskIn .4s ease both;
  }

  .empty-state .glyph{
    font-size:30px;
    margin-bottom:10px;
    display:block;
  }

  .empty-state p{ font-size:14.5px; }
  .empty-state .sub{ font-size:12.5px; color:#B6AE9D; margin-top:4px; }

  /* footer / filters */
  .sheet-footer{
    position:relative;
    z-index:1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px dashed var(--line);
  }

  .filters{
    display:flex;
    gap:4px;
    background: var(--paper-dim);
    padding:4px;
    border-radius:10px;
  }

  .filter-btn{
    border:none;
    background:transparent;
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    font-weight:600;
    padding: 6px 12px;
    border-radius:7px;
    color: var(--text-soft);
    cursor:pointer;
    transition: background .2s, color .2s;
  }

  .filter-btn.active{
    background:#fff;
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .clear-btn{
    border:none;
    background:transparent;
    font-family:'Inter', sans-serif;
    font-size:12.5px;
    font-weight:600;
    color: var(--text-soft);
    cursor:pointer;
    transition: color .2s;
  }
  .clear-btn:hover{ color: var(--coral); }

  footer.credit{
    text-align:center;
    margin-top:22px;
    font-size:12px;
    color: rgba(255,255,255,0.28);
    letter-spacing:.03em;
  }

  @media (max-width: 480px){
    .sheet{ padding: 34px 24px 28px; }
    h1{ font-size:30px; }
    .add-row{ flex-wrap:wrap; }
    .add-row input{ flex:1 1 100%; }
    .cat-select-wrap{ flex:1; }
    .cat-select{ width:100%; }
    .add-btn{ flex:0 0 50px; }
  }

  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
  }
</style>
</head>
<body>
  <div class="desk-glow"></div>

  <div class="page-wrap">
    <div class="sheet">
      <header>
        <div class="eyebrow"><span class="dot"></span> Daily Page</div>
        <h1>Today's <em>to-do</em></h1>
        <div class="sub-row">
          <span class="date-line" id="dateLine"></span>
          <span class="progress-text" id="progressText">0 of 0 done</span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      </header>

      <form class="add-row" id="addForm" autocomplete="off">
        <input type="text" id="taskInput" placeholder="Write something down…" maxlength="140" aria-label="New task">
        <div class="cat-select-wrap">
          <select class="cat-select" id="catSelect" aria-label="Category"></select>
        </div>
        <button type="submit" class="add-btn" aria-label="Add task">+</button>
      </form>

      <div class="cat-filters" id="catFilters"></div>

      <ul class="list" id="taskList"></ul>

      <div class="sheet-footer">
        <div class="filters" id="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="done">Done</button>
        </div>
        <button class="clear-btn" id="clearDone">Clear done</button>
      </div>
    </div>

    <footer class="credit" id="storageNote">stored locally in your browser</footer>
  </div>

<script>
(function(){
  const STORAGE_KEY = 'daily-page-tasks-v1';
  let tasks = [];
  let filter = 'all';
  let activeCategory = 'all';

  const CATEGORIES = [
    { id:'work',     label:'Work',     color:'var(--cat-work)' },
    { id:'personal', label:'Personal', color:'var(--cat-personal)' },
    { id:'shopping', label:'Shopping', color:'var(--cat-shopping)' },
    { id:'health',   label:'Health',   color:'var(--cat-health)' },
    { id:'other',    label:'Other',    color:'var(--cat-other)' }
  ];
  const DEFAULT_CATEGORY = 'other';

  function catById(id){
    return CATEGORIES.find(c => c.id === id) || CATEGORIES.find(c => c.id === DEFAULT_CATEGORY);
  }

  const listEl = document.getElementById('taskList');
  const inputEl = document.getElementById('taskInput');
  const formEl = document.getElementById('addForm');
  const catSelectEl = document.getElementById('catSelect');
  const catFiltersEl = document.getElementById('catFilters');
  const progressText = document.getElementById('progressText');
  const progressFill = document.getElementById('progressFill');
  const clearBtn = document.getElementById('clearDone');
  const filterBtns = document.querySelectorAll('.filter-btn');
  const dateLine = document.getElementById('dateLine');

  // ---------- persistence ----------
  // localStorage is unavailable in some sandboxed/preview contexts (throws
  // SecurityError on access, not just on write). Detect that up front and
  // fall back to in-memory state so the app still works either way.
  let storageOK = false;
  try{
    const testKey = '__storage_test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
    storageOK = true;
  }catch(e){
    storageOK = false;
  }

  function load(){
    if(!storageOK){ tasks = []; return; }
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      tasks = raw ? JSON.parse(raw) : [];
    }catch(e){
      tasks = [];
    }
    // backfill category for tasks saved before this feature existed
    tasks.forEach(t => {
      if(!t.category || !CATEGORIES.some(c => c.id === t.category)){
        t.category = DEFAULT_CATEGORY;
      }
    });
  }

  function save(){
    if(!storageOK) return;
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }catch(e){
      storageOK = false; // stop retrying a dead storage layer
    }
  }

  function uid(){
    return 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
  }

  // ---------- date ----------
  function setDate(){
    const d = new Date();
    dateLine.textContent = d.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
  }

  // ---------- category UI ----------
  function populateCatSelect(){
    catSelectEl.innerHTML = CATEGORIES.map(c =>
      `<option value="${c.id}">${c.label}</option>`
    ).join('');
    catSelectEl.value = DEFAULT_CATEGORY;
  }

  function renderCatFilters(){
    const allCount = tasks.length;
    let html = `<button class="cat-chip${activeCategory==='all' ? ' active' : ''}" data-cat="all">
      <span class="count">${allCount}</span> All categories
    </button>`;

    CATEGORIES.forEach(c => {
      const count = tasks.filter(t => t.category === c.id).length;
      if(count === 0 && activeCategory !== c.id) return; // hide empty categories to reduce clutter
      html += `<button class="cat-chip${activeCategory===c.id ? ' active' : ''}" data-cat="${c.id}">
        <span class="swatch" style="background:${c.color}"></span>${c.label}
        <span class="count">${count}</span>
      </button>`;
    });

    catFiltersEl.innerHTML = html;
    catFiltersEl.querySelectorAll('.cat-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        render();
      });
    });
  }

  // ---------- rendering ----------
  function visibleTasks(){
    let result = tasks;
    if(filter === 'active') result = result.filter(t => !t.done);
    if(filter === 'done') result = result.filter(t => t.done);
    if(activeCategory !== 'all') result = result.filter(t => t.category === activeCategory);
    return result;
  }

  function render(){
    renderCatFilters();
    const vis = visibleTasks();
    listEl.innerHTML = '';

    if(vis.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      if(tasks.length === 0){
        empty.innerHTML = `<span class="glyph">&#9998;</span><p>Nothing here yet</p><div class="sub">Add your first task above</div>`;
      } else if(activeCategory !== 'all'){
        empty.innerHTML = `<span class="glyph">&#9676;</span><p>Nothing in ${catById(activeCategory).label}</p><div class="sub">Try a different category or filter</div>`;
      } else if(filter === 'done'){
        empty.innerHTML = `<span class="glyph">&#9676;</span><p>No completed tasks</p><div class="sub">Check something off to see it here</div>`;
      } else {
        empty.innerHTML = `<span class="glyph">&#10003;</span><p>All clear</p><div class="sub">Everything's checked off</div>`;
      }
      listEl.appendChild(empty);
    } else {
      vis.forEach(task => listEl.appendChild(renderTask(task)));
    }

    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    progressText.textContent = total === 0 ? 'No tasks yet' : `${done} of ${total} done`;
    progressFill.style.width = total === 0 ? '0%' : `${(done/total)*100}%`;
  }

  function renderTask(task){
    const li = document.createElement('li');
    li.className = 'task' + (task.done ? ' done' : '');
    li.dataset.id = task.id;

    const check = document.createElement('button');
    check.className = 'check';
    check.setAttribute('aria-label', task.done ? 'Mark as not done' : 'Mark as done');
    check.innerHTML = `<svg viewBox="0 0 24 24"><path d="M4 12.5l5.5 5.5L20 6.5"/></svg>`;
    check.addEventListener('mousedown', (e) => e.preventDefault());
    check.addEventListener('click', () => toggleDone(task.id));

    const body = document.createElement('div');
    body.className = 'task-body';

    const text = document.createElement('div');
    text.className = 'task-text';
    text.textContent = task.text;
    text.contentEditable = 'true';
    text.spellcheck = false;
    text.addEventListener('blur', () => commitEdit(task.id, text));
    text.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){ e.preventDefault(); text.blur(); }
      if(e.key === 'Escape'){ text.textContent = task.text; text.blur(); }
    });

    body.appendChild(text);

    const cat = catById(task.category);
    const catBadge = document.createElement('div');
    catBadge.className = 'task-cat';
    catBadge.innerHTML = `<span class="swatch" style="background:${cat.color}"></span>${cat.label}`;
    body.appendChild(catBadge);

    const actions = document.createElement('div');
    actions.className = 'task-actions';

    const delBtn = document.createElement('button');
    delBtn.className = 'icon-btn delete';
    delBtn.setAttribute('aria-label', 'Delete task');
    delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/></svg>`;
    // mousedown fires before the text element's blur-triggered re-render,
    // so we delete on mousedown (and suppress the focus shift) to avoid the
    // button being detached from the DOM before its click event lands.
    delBtn.addEventListener('mousedown', (e) => e.preventDefault());
    delBtn.addEventListener('click', () => removeTask(task.id));

    actions.appendChild(delBtn);

    li.appendChild(check);
    li.appendChild(body);
    li.appendChild(actions);
    return li;
  }

  // ---------- actions ----------
  function addTask(text){
    text = text.trim();
    if(!text){
      inputEl.classList.add('shake');
      setTimeout(() => inputEl.classList.remove('shake'), 420);
      return;
    }
    const category = CATEGORIES.some(c => c.id === catSelectEl.value) ? catSelectEl.value : DEFAULT_CATEGORY;
    tasks.unshift({ id: uid(), text, done:false, category, createdAt: Date.now() });
    save();
    if(filter === 'done'){ filter = 'all'; syncFilterButtons(); }
    render();
    inputEl.value = '';
    inputEl.focus();
  }

  function toggleDone(id){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    t.done = !t.done;
    save();
    render();
  }

  function commitEdit(id, el){
    const t = tasks.find(t => t.id === id);
    if(!t) return;
    const newText = el.textContent.trim();
    if(!newText){
      removeTask(id);
      return;
    }
    t.text = newText;
    save();
  }

  function removeTask(id){
    const li = listEl.querySelector(`.task[data-id="${id}"]`);
    if(li){
      li.classList.add('removing');
      li.addEventListener('animationend', () => {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }, { once:true });
    } else {
      tasks = tasks.filter(t => t.id !== id);
      save();
      render();
    }
  }

  function clearDone(){
    const doneEls = [...listEl.querySelectorAll('.task.done')];
    if(doneEls.length === 0) return;
    doneEls.forEach(el => el.classList.add('removing'));
    setTimeout(() => {
      tasks = tasks.filter(t => !t.done);
      save();
      render();
    }, 320);
  }

  function syncFilterButtons(){
    filterBtns.forEach(b => b.classList.toggle('active', b.dataset.filter === filter));
  }

  // ---------- events ----------
  formEl.addEventListener('submit', (e) => {
    e.preventDefault();
    addTask(inputEl.value);
  });

  clearBtn.addEventListener('click', clearDone);

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      syncFilterButtons();
      render();
    });
  });

  // ---------- init ----------
  setDate();
  populateCatSelect();
  load();
  render();
  inputEl.focus();

  const noteEl = document.getElementById('storageNote');
  if(noteEl){
    noteEl.textContent = storageOK
      ? 'saved automatically in this browser'
      : 'this preview can\'t save between visits — your edits stay until you close or refresh the tab';
  }
})();
</script>
</body>
</html>
